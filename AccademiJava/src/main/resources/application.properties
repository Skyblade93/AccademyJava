spring.application.name=AccademiJava

spring.datasource.url=jdbc:postgresql://localhost:5432/accademi
spring.datasource.username=postgres
spring.datasource.password=root

# Schema di default
spring.jpa.properties.hibernate.default_schema=accademi

# ? Disabilita Hibernate auto schema
spring.jpa.hibernate.ddl-auto=validate

# ? Esegui sempre SQL all'avvio
spring.sql.init.mode=never

#-------------------------------------------- ? Esegui SOLO LA PRIMA VOLTA schema---------------------------------------

# spring.jpa.hibernate.ddl-auto=update

# ? Esegui SOLO LA PRIMA VOLTA SQL all'avvio
# spring.sql.init.mode= always


# (opzionale ma consigliato)
spring.jpa.show-sql=false
